mixed-port: 4949
redir-port: 14949
allow-lan: true
ipv6: false
log-level: debug
mode: rule
keep-alive-interval: 1800
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: random
dns:
    enable: true
    listen: 0.0.0.0:4953
    ipv6: false
    enhanced-mode: fake-ip
    fake-ip-range: 22.49.0.1/16
    prefer-h3: true
    default-nameserver:
      - 223.5.5.5
    nameserver:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
sniffer:
    enable: true
    force-dns-mapping: true
    parse-pure-ip: true
    override-destination: true
    sniff:
      HTTP:
        ports: [80, 8080]
      TLS:
        ports: [443, 8443]
    skip-domain:
      - Mijia Cloud
