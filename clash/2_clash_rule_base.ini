mixed-port: 4901
redir-port: 4902
tproxy-port: 4903
allow-lan: true
ipv6: false
log-level: warning
mode: rule
keep-alive-interval: 1800
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: random
dns:
    enable: true
    listen: 0.0.0.0:4953
    ipv6: false
    enhanced-mode: fake-ip
    fake-ip-range: 22.49.0.1/16
    prefer-h3: true
    default-nameserver:
      - 223.5.5.5
    nameserver:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
