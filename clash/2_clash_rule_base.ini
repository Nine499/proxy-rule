mixed-port: 4949
ipv6: false
log-level: warning
mode: rule
keep-alive-interval: 1800
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: random
dns:
    enable: true
    listen: 0.0.0.0:4953
    ipv6: false
    enhanced-mode: fake-ip
    fake-ip-range: 22.49.0.1/16
    prefer-h3: true
    nameserver:
      - https://dns.alidns.com/dns-query
